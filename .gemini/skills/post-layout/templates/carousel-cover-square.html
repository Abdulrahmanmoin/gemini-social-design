<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Cover (Square) — Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 0;
      font-family: 'Space Grotesk', sans-serif;
    }
    .slide {
      width: 1080px;
      height: 1080px;          /* square — LOCKED for carousels */
      overflow: hidden;
      position: relative;
      background: #0a0a12;
      padding: 96px 88px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
    }
    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 100% 0%, rgba(217, 70, 239, 0.35), transparent 50%),
        radial-gradient(circle at 0% 100%, rgba(124, 58, 237, 0.4), transparent 55%);
      pointer-events: none;
    }
    .slide > * { position: relative; z-index: 1; }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .top .badge {
      padding: 10px 20px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
    }

    .hook {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 116px;
      line-height: 1.0;
      letter-spacing: -0.03em;
      color: #fff;
      max-width: 880px;
    }
    .hook .accent {
      background: linear-gradient(90deg, #f0abfc 0%, #c026d3 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hook em {
      font-style: italic;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 32px;
    }
    .swipe {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: 0.04em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .swipe .arrow {
      display: inline-flex;
      width: 56px;
      height: 56px;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #c026d3, #7c3aed);
      font-size: 28px;
    }
    .meta {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 22px;
      color: rgba(255,255,255,0.55);
      line-height: 1.5;
    }
    .meta .author { color: #fff; font-weight: 600; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="top">
      <span class="badge">01 / 09</span>
      <span>Carousel · save for later</span>
    </div>

    <h1 class="hook">
      The mistake<br>
      nobody talks<br>
      about with <span class="accent">Gemini CLI</span>.<br>
      <em>(and how to fix it in 2 mins)</em>
    </h1>

    <div class="bottom">
      <div class="swipe">
        Swipe <span class="arrow">→</span>
      </div>
      <div class="meta">
        <div class="author">@yourhandle</div>
        <div>Designer · Builder</div>
      </div>
    </div>
  </div>
</body>
</html>
