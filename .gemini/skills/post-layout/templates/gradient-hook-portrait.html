<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Hook Portrait — Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 0;
      font-family: 'Inter', sans-serif;
    }
    .slide {
      width: 1080px;
      height: 1350px;          /* portrait 4:5 — LOCKED */
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 20% 10%, #f0abfc 0%, transparent 45%),
        radial-gradient(circle at 90% 90%, #fb7185 0%, transparent 45%),
        linear-gradient(135deg, #c026d3 0%, #7c3aed 60%, #4338ca 100%);
      padding: 96px 88px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: #fff;
    }
    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 28px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.78);
    }
    .hook {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 800;
      font-size: 132px;
      line-height: 1.02;
      letter-spacing: -0.02em;
      color: #fff;
      text-transform: uppercase;
      max-width: 880px;
    }
    .hook .accent {
      background: linear-gradient(90deg, #fde047 0%, #f97316 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }
    .author {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fde047, #f97316);
      border: 3px solid rgba(255,255,255,0.4);
      flex-shrink: 0;
    }
    .author-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .author-name {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      font-size: 32px;
      color: #fff;
    }
    .author-handle {
      font-size: 24px;
      color: rgba(255,255,255,0.7);
    }
    .cta {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      font-size: 28px;
      padding: 18px 32px;
      background: #fff;
      color: #1f1147;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="eyebrow">Replace · with · context</div>

    <h1 class="hook">
      Don't ignore <span class="accent">this</span>.<br>
      Replace with the<br>
      contrarian hook.
    </h1>

    <div class="footer">
      <div class="author">
        <div class="avatar"></div>
        <div class="author-text">
          <div class="author-name">Your Name</div>
          <div class="author-handle">@yourhandle</div>
        </div>
      </div>
      <div class="cta">Read caption →</div>
    </div>
  </div>
</body>
</html>
